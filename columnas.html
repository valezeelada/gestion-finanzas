<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script src="https://www.gstatic.com/charts/loader.js"></script>

<script>

google.charts.load('current', {
  packages:['corechart']
});

google.charts.setOnLoadCallback(drawChart);

function drawChart() {

  var query = new google.visualization.Query(
    'https://docs.google.com/spreadsheets/d/1W6TYkQ6_nxyckV6G6AcyRX4Oil17mAJ5YGP4DlRK1Z4/gviz/tq?gid=0'
  );

  query.setQuery('SELECT C,D');

  query.send(function(response){

    if(response.isError()){

      alert(
        response.getMessage() +
        "\n" +
        response.getDetailedMessage()
      );

      return;
    }

    var data = response.getDataTable();

    data.sort([
      {column:1, desc:true}
    ]);

    var total = 0;

    for(var i=0; i<data.getNumberOfRows(); i++){
      total += Number(data.getValue(i,1));
    }

    document.getElementById("total").innerHTML =
      "💰 Total Gastado: Gs. " +
      total.toLocaleString('es-PY');

    document.getElementById("movimientos").innerHTML =
      "📝 Movimientos Registrados: " +
      data.getNumberOfRows();

    var formatter =
    new google.visualization.NumberFormat({
      groupingSymbol: '.',
      suffix: ' Gs.'
    });

    formatter.format(data,1);

    var chart =
      new google.visualization.ColumnChart(
        document.getElementById('chart_div')
      );

    var options = {

      title:'Reporte de Gastos por Concepto',

      titleTextStyle:{
        color:'#65A30D',
        fontSize:24,
        bold:true
      },

      backgroundColor:'#F3F4F6',

      colors:['#84CC16'],

      chartArea:{
        left:100,
        top:70,
        width:'80%',
        height:'70%'
      },

      hAxis:{
        title:'Conceptos'
      },

      vAxis:{
        title:'Importe (Gs.)'
      },

      legend:{
        position:'none'
      },

      width:950,
      height:550

    };

    chart.draw(data, options);

  });

}

</script>

<style>

body{
  background:#F3F4F6;
  font-family:monospace;
  margin:20px;
}

.dashboard{
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.info{
  font-size:20px;
  color:#374151;
  margin:10px 0;
}

</style>

</head>

<body>

<div class="dashboard">

<h1 style="color:#65A30D;">
💰 Gestión de Finanzas
</h1>

<div id="total" class="info"></div>

<div id="movimientos" class="info"></div>

</div>

<div id="chart_div"
style="width:100%;height:600px;">
</div>

</body>

</html>
